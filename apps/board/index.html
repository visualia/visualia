<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="light" />
    <title>Board</title>
    <!-- critical: the app CSS is JS-imported, so paint the board background on
         the first frame — without this a dark-mode browser flashes black on load -->
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #f5f5f3;
      }
    </style>
  </head>
  <body>
    <div id="board-root">
      <canvas id="gl" layoutsubtree></canvas>
      <div id="dom-layer" hidden><div id="dom-layer-inner"></div></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
